services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_pgvector
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Enable with:  docker compose --profile app up --build
  app:
    profiles: ["app"]
    build: .
    container_name: rag_app
    depends_on:
      db:
        condition: service_healthy
    # Pass the whole .env into the container (OpenAI key, vision, retrieval,
    # ingestion settings…). Without this, only the vars listed under
    # `environment:` would reach the app and .env settings would be ignored.
    env_file:
      - .env
    environment:
      # Override the DB host for the Docker network (beats the .env value).
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      # Sensible defaults if absent from .env.
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      # Persist the embedding model across rebuilds (avoids re-downloading it).
      - hf_cache:/root/.cache/huggingface
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
  hf_cache:
